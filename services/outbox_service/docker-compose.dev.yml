version: '3.8'

services:
  poller:
    build: .
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_NAME: neuralmedic
      DB_USER: admin
      DB_PASS: password
      REDIS_HOST: redis
  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuralmedic
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    ports:
      - "6380:6379"
