version: '3.8'

services:
  context_service:
    build: .
    container_name: neuralmedic_context_service
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      - postgres
    networks:
      - neuralmedic_network

networks:
  neuralmedic_network:
    external: true
