version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neuralmedic_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: neuralmedic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - neuralmedic_network

  redis:
    image: redis:7-alpine
    container_name: neuralmedic_redis
    ports:
      - "6379:6379"
    networks:
      - neuralmedic_network

networks:
  neuralmedic_network:
    driver: bridge

volumes:
  postgres_data:
