version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neuralmedic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - neuralmedic_network

  redis:
    image: redis:7-alpine
    container_name: neuralmedic_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - neuralmedic_network

  outbox_poller:
    build:
      context: ./services/outbox_service
    container_name: neuralmedic_outbox_poller
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
    networks:
      - neuralmedic_network

  orchestrator:
    build:
      context: ./services/orchestrator
    container_name: neuralmedic_orchestrator
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - neuralmedic_network

  synthesizer:
    build:
      context: ./services/synthesizer_service
    container_name: neuralmedic_synthesizer
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-""}
    networks:
      - neuralmedic_network

networks:
  neuralmedic_network:
    driver: bridge

volumes:
  postgres_data:
