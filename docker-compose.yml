services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: neuralmedic_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - neuralmedic_network

  redis:
    image: redis:7-alpine
    container_name: neuralmedic_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - neuralmedic_network

  outbox_poller:
    build:
      context: ./services/outbox_service
    container_name: neuralmedic_outbox_poller
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - neuralmedic_network

  context_service:
    build:
      context: ./services/context_service
    container_name: neuralmedic_context_service
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8004:8000"
    networks:
      - neuralmedic_network

  embedding_service:
    build:
      context: ./services/embedding_service
    container_name: neuralmedic_embedding_service
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    networks:
      - neuralmedic_network

  interview_agent:
    build:
      context: ./services/interview_agent
    container_name: neuralmedic_interview_agent
    restart: always
    depends_on:
      - postgres
      - chromadb
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8001:8001"
    networks:
      - neuralmedic_network

  pathology_worker:
    build:
      context: ./services/pathology_worker
    container_name: neuralmedic_pathology_worker
    restart: always
    depends_on:
      - postgres
      - context_service
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CONTEXT_SERVICE_URL: http://context_service:8000
    ports:
      - "8002:8002"
    networks:
      - neuralmedic_network

  risk_worker:
    build:
      context: ./services/risk_worker
    container_name: neuralmedic_risk_worker
    restart: always
    depends_on:
      - postgres
      - context_service
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CONTEXT_SERVICE_URL: http://context_service:8000
    ports:
      - "8004:8004"
    networks:
      - neuralmedic_network

  orchestrator:
    build:
      context: ./services/orchestrator
    deploy:
      mode: replicated
      replicas: 3
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - neuralmedic_network
  synthesizer_agent:
    build:
      context: ./services/synthesizer_agent
    container_name: neuralmedic_synthesizer_agent
    restart: always
    depends_on:
      - postgres
      - redis
      - context_service
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_HOST: redis
      CONTEXT_SERVICE_URL: http://context_service:8000
      PYTHONUNBUFFERED: 1
    ports:
      - "8005:8005"
    networks:
      - neuralmedic_network

  synthesizer:
    build:
      context: ./services/synthesizer_service
    container_name: neuralmedic_synthesizer
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-""}
    networks:
      - neuralmedic_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: neuralmedic_chromadb
    restart: always
    ports:
      - "8003:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - neuralmedic_network

networks:
  neuralmedic_network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
