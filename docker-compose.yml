services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: neuralmedic_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralmedic_network

  redis:
    image: redis:7-alpine
    container_name: neuralmedic_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - neuralmedic_network

  outbox_poller:
    build:
      context: ./backend/outbox_service
    container_name: neuralmedic_outbox_poller
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - neuralmedic_network

  context_service:
    build:
      context: ./backend/context_service
    container_name: neuralmedic_context_service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-"default_internal_secret_key"}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import http.client; conn = http.client.HTTPConnection(\"localhost\", 8000); conn.request(\"GET\", \"/health\"); res = conn.getresponse(); exit(0 if res.status == 200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"
    networks:
      - neuralmedic_network

  embedding_service:
    build:
      context: ./backend/embedding_service
    container_name: neuralmedic_embedding_service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    networks:
      - neuralmedic_network

  interview_agent:
    build:
      context: ./agents/interview_agent
    container_name: neuralmedic_interview_agent
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-"default_internal_secret_key"}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8001:8001"
    networks:
      - neuralmedic_network

  pathology_worker:
    build:
      context: ./backend/pathology_worker
    container_name: neuralmedic_pathology_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      context_service:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-"default_internal_secret_key"}
      CONTEXT_SERVICE_URL: http://context_service:8000
    ports:
      - "8002:8002"
    networks:
      - neuralmedic_network

  risk_worker:
    build:
      context: ./backend/risk_worker
    container_name: neuralmedic_risk_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      context_service:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-"default_internal_secret_key"}
      CONTEXT_SERVICE_URL: http://context_service:8000
    ports:
      - "8004:8004"
    networks:
      - neuralmedic_network

  orchestrator:
    build:
      context: ./backend/orchestrator
    deploy:
      mode: replicated
      replicas: 3
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: admin
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-"default_internal_secret_key"}
    networks:
      - neuralmedic_network

  synthesizer_agent:
    build:
      context: ./agents/synthesizer_agent
    container_name: neuralmedic_synthesizer_agent
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      context_service:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GROQ_API_KEY: ${GROQ_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-"default_internal_secret_key"}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      CONTEXT_SERVICE_URL: http://context_service:8000
      PYTHONUNBUFFERED: 1
    ports:
      - "8005:8005"
    networks:
      - neuralmedic_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: neuralmedic_chromadb
    restart: always
    ports:
      - "8003:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - neuralmedic_network

  frontend:
    build:
      context: ./frontend
    container_name: neuralmedic_frontend
    restart: always
    depends_on:
      interview_agent:
        condition: service_started
      context_service:
        condition: service_healthy
    environment:
      INTERVIEW_AGENT_URL: http://interview_agent:8001
      CONTEXT_SERVICE_URL: http://context_service:8000
    ports:
      - "3001:3000"
    networks:
      - neuralmedic_network

networks:
  neuralmedic_network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
